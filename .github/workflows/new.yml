name: New Issue Submitted

on: 
  issues:
    types: [opened]

jobs:
  print-issue:
    runs-on: windows
    steps:
      - name: "Display Message"
        run: |
          echo "New issue has been opened!"
          echo "The issue was titled: ${{ github.event.issue.title }}"
          echo "The issue was created by: ${{ github.event.issue.user.login }}"

